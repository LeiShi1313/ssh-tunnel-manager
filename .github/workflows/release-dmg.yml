name: Build Release DMG

on:
  release:
    types:
      - published
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-dmg:
    runs-on: macos-14

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build release app
        run: |
          xcodebuild \
            -project SSHTunnelManager.xcodeproj \
            -scheme SSHTunnelManager \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            clean build

      - name: Package DMG
        id: package
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail

          VERSION="${RELEASE_TAG:-manual-${GITHUB_RUN_NUMBER}}"
          APP_PATH="build/Build/Products/Release/SSHTunnelManager.app"
          STAGING_DIR="dist/dmg"
          DMG_NAME="SSHTunnelManager-${VERSION}.dmg"
          DMG_PATH="dist/${DMG_NAME}"

          rm -rf dist
          mkdir -p "${STAGING_DIR}"
          cp -R "${APP_PATH}" "${STAGING_DIR}/"
          ln -s /Applications "${STAGING_DIR}/Applications"

          hdiutil create \
            -volname "SSH Tunnel Manager" \
            -srcfolder "${STAGING_DIR}" \
            -ov \
            -format UDZO \
            "${DMG_PATH}"

          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"
          echo "dmg_name=${DMG_NAME}" >> "${GITHUB_OUTPUT}"
          echo "dmg_path=${DMG_PATH}" >> "${GITHUB_OUTPUT}"

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.package.outputs.dmg_name }}
          path: ${{ steps.package.outputs.dmg_path }}

      - name: Attach DMG to GitHub release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" "${{ steps.package.outputs.dmg_path }}" --clobber
